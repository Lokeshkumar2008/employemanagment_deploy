{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}

{% block extra_css %}
<style>

/* WRAPPER (FIX CENTER PERFECTLY) */
.edit-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 120px); /* ✅ full center */
    padding:20px;
}

/* CARD */
.edit-card{
    width:100%;
    max-width:420px;
    padding:30px;
    border-radius:15px;
    background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
.edit-card h3{
    font-weight:700;
    margin-bottom:20px;
    text-align:center; /* ✅ center text */
}

/* INPUT */
.form-control{
    border-radius:10px;
    padding:12px;
    margin-bottom:15px;
}

/* BUTTON */
.btn-update{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    color:white;
    font-weight:600;
}

/* 🔥 MOBILE PERFECT FIX */
@media(max-width:576px){

    .edit-wrapper{
        align-items:flex-start;   /* ⬅ prevents cut top */
        padding-top:30px;
    }

    .edit-card{
        max-width:100%;
        padding:20px;
        border-radius:12px;
    }

    .form-control{
        padding:10px;
    }

}

</style>
{% endblock %}

{% block content %}

<div class="edit-wrapper">

    <div class="edit-card">

        <h3>Edit Employee</h3>

        <form method="POST">

            <input type="text" class="form-control" name="eid" value="{{ emp[0] }}" readonly>

            <input type="text" class="form-control" name="ename" value="{{ emp[1] }}" placeholder="Name" required>

            <input type="text" class="form-control" name="edept" value="{{ emp[2] }}" placeholder="Department" required>

            <input type="number" class="form-control" name="esalary" value="{{ emp[4] }}" placeholder="Salary" required>

            <input type="text" class="form-control" name="ephone" value="{{ emp[5] }}" placeholder="Phone" required>

            <button type="submit" class="btn-update">Update Employee</button>

        </form>

    </div>

</div>

{% endblock %}

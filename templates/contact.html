{% extends 'base.html' %}

{% block title %}Contact{% endblock %}

{% block extra_css %}
<style>

/* 🔥 FIX CONTAINER */
.contact-container {
    padding: 30px 15px 50px;
    max-width: 1100px;
    margin: 0 auto;
}

/* HEADER */
.contact-header {
    text-align: center;
    margin-bottom: 30px;
}

.contact-title {
    font-size: 2rem;
    font-weight: 800;
}

.contact-subtitle {
    font-size: 0.95rem;
    color: #64748b;
}

/* LEFT CARD */
.contact-info-card {
    background: #f9fafb;
    border-radius: 15px;
    padding: 25px;
    height: 100%;
}

/* INFO ITEM */
.info-item {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
}

.info-icon {
    width: 45px;
    height: 45px;
    background: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4f46e5;
}

.info-content h4 {
    font-size: 1rem;
    font-weight: 700;
}

.info-content p {
    font-size: 0.9rem;
    margin: 0;
}

/* FORM CARD */
.contact-form-card {
    background: white;
    border-radius: 15px;
    padding: 25px;
}

/* INPUT */
.form-control-custom {
    width: 100%;
    padding: 12px 15px 12px 45px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
}

/* ICON */
.input-wrapper {
    position: relative;
}

.input-wrapper i {
    position: absolute;
    left: 12px;
    top: 12px;
    color: #94a3b8;
}

/* BUTTON */
.btn-submit {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #4f46e5;
    color: white;
    margin-top: 10px;
}

/* 🔥 RESPONSIVE FIX */
@media (max-width: 768px) {

    .row {
        flex-direction: column !important;
    }

    .col-lg-5,
    .col-lg-7 {
        width: 100%;
    }

    .contact-info-card,
    .contact-form-card {
        margin-bottom: 20px;
    }

    .contact-title {
        font-size: 1.6rem;
    }

    .info-item {
        align-items: center;
    }

}

</style>
{% endblock %}

{% block content %}

<div class="contact-container">

    <div class="contact-header">
        <h1 class="contact-title">Get in Touch</h1>
        <p class="contact-subtitle">We will respond quickly to your request</p>
    </div>

    <div class="row g-3">

        <!-- LEFT -->
        <div class="col-lg-5">
            <div class="contact-info-card">

                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                    <div class="info-content">
                        <h4>Address</h4>
                        <p>San Francisco</p>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div class="info-content">
                        <h4>Email</h4>
                        <p>support@email.com</p>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                    <div class="info-content">
                        <h4>Phone</h4>
                        <p>+91 9876543210</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-7">
            <div class="contact-form-card">

                <form method="POST">

                    <div class="mb-3 input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" class="form-control-custom" placeholder="Full Name">
                    </div>

                    <div class="mb-3 input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" class="form-control-custom" placeholder="Phone">
                    </div>

                    <div class="mb-3 input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" class="form-control-custom" placeholder="Email">
                    </div>

                    <div class="mb-3 input-wrapper">
                        <i class="fa-solid fa-comment"></i>
                        <textarea class="form-control-custom" placeholder="Message"></textarea>
                    </div>

                    <button class="btn-submit">Send Message</button>

                </form>

            </div>
        </div>

    </div>

</div>

{% endblock %}

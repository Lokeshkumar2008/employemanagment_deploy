<!doctype html>

<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;

    background:
        linear-gradient(rgba(78,84,200,0.7), rgba(143,148,251,0.7)),
        url("https://w0.peakpx.com/wallpaper/795/959/HD-wallpaper-best-web-development-company-in-lucknow-web-developer-web-design-web-application-web-development.jpg");

    background-size: cover;
}

/* NAVBAR */
.navbar {
    background: rgba(255,255,255,0.9);
}

/* FLASH */
.flash-box {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    z-index: 9999;
}

/* CARD */
.contact-card {
    width: 90%;
    max-width: 400px;
    margin: auto;
    margin-top: 70px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    color: white;
}

.contact-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    border-radius: 10px;
    border: none;
}

/* FOOTER */
footer {
    margin-top: auto;
    background: rgba(255,255,255,0.9);
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <img src="https://static.vecteezy.com/system/resources/previews/020/859/601/non_2x/employee-management-icon-design-free-vector.jpg" width="50">


    <h4 class="ms-2">EMPLOYEE MANAGEMENT SYSTEM</h4>

    <div class="ms-auto">
        <a class="me-3" href="/view">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>


</nav>

<!-- 🔥 FLASH -->

<div class="flash-box">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <div class="alert alert-{{category}} alert-dismissible fade show">
      {{ msg }}
      <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endwith %}
</div>

<!-- FORM -->

<div class="contact-card">
    <h2>Contact</h2>


<form action="/contact" method="POST">
    <input type="text" name="name" placeholder="Enter Name" required>
    <input type="number" name="phone" placeholder="Enter Phone Number" required>
    <input type="email" name="email" placeholder="Enter Email" required>
    <input type="text" name="reason" placeholder="Reason" required>

    <button class="submit-btn">Submit</button>
</form>


</div>

<!-- FOOTER -->

<footer>
    © 2026 Employee Management System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

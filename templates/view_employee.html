<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>View Employees</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.navbar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: #e5e7eb;
}

.logo {
    width: 50px;
    border-radius: 50%;
}

.nav-title {
    font-size: 20px;
    font-weight: 600;
    margin-left: 10px;
}

.search-form {
    width: 40%;
}

.main-section {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(rgba(90,90,200,0.7), rgba(90,90,200,0.7)),
    url("https://w0.peakpx.com/wallpaper/795/959/HD-wallpaper-best-web-development-company-in-lucknow-web-developer-web-design-web-application-web-development.jpg");

    background-size: cover;
}

.table-card {
    width: 90%;
    max-width: 900px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid rgba(255,255,255,0.4);
    padding: 10px;
}

th {
    background: rgba(0,0,0,0.4);
}

.edit { color: #00ffcc; }
.delete { color: red; }

.footer {
    background: #e5e7eb;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

<div class="d-flex align-items-center">
    <img class="logo" src="https://static.vecteezy.com/system/resources/previews/020/859/601/non_2x/employee-management-icon-design-free-vector.jpg">
    <span class="nav-title">EMPLOYEE MANAGEMENT SYSTEM</span>
</div>

<!-- 🔥 FIXED SEARCH -->
<form class="d-flex mx-auto search-form" action="/view" method="get">
    <input class="form-control me-2" type="search" name="query" placeholder="Search employee..." required>
    <button class="btn btn-primary">Search</button>
</form>

<div class="d-flex gap-3">
    <a href="/add_employee">Add Employee</a>
    <a href="/logout">Logout</a>
</div>

</nav>

<!-- MAIN -->
<div class="main-section">

<div class="table-card">

<h2 class="text-center mb-3">Employee List</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Salary</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for e in employyes %}
<tr>
<td>{{e[0]}}</td>
<td>{{e[1]}}</td>
<td>{{e[2]}}</td>
<td>{{e[3]}}</td>
<td>{{e[4]}}</td>
<td>
<a href="/edit/{{e[0]}}" class="edit">Edit</a>
<a href="/delete/{{e[0]}}" class="delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</div>

<div class="footer">
© 2026 Employee Management System
</div>

</body>
</html>

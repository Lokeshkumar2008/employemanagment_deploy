{% extends "base.html" %}

{% block title %}Verify Account{% endblock %}

{% block extra_css %}

<!-- ICON CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* REMOVE GAP */
main {
    padding: 0 !important;
}

/* CENTER */
.verify-wrapper {
    min-height: calc(100vh - 76px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CARD */
.verify-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* ICON */
.icon-box {
    width: 60px;
    height: 60px;
    background: #e0f2fe;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 26px;
    color: #2563eb;
}

/* TEXT */
.title {
    font-size: 22px;
    font-weight: 700;
    margin-top: 10px;
}

.subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
}

/* INPUT */
.input-wrapper {
    position: relative;
    margin-bottom: 15px;
}

.input-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.input-wrapper input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
    text-align: center;
    letter-spacing: 3px;
    font-weight: bold;
}

/* BUTTON */
.btn-verify {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color: white;
    font-weight: bold;
}

/* LINK */
.links a {
    text-decoration: none;
    color: #2563eb;
    font-size: 13px;
}

/* MOBILE */
@media(max-width:768px){
    .verify-card {
        padding: 20px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="verify-wrapper">

    <div class="verify-card">

        <!-- ICON -->
        <div class="icon-box">
            <i class="bi bi-shield-check"></i>
        </div>

        <!-- TITLE -->
        <div class="title">Verify Code</div>
        <div class="subtitle">
            Enter the OTP sent to your email
        </div>

        <!-- FORM -->
        <form method="POST" action="/verify">

            <div class="input-wrapper">
                <i class="bi bi-key"></i>
                <input type="text" name="otp" placeholder="••••••" maxlength="6" required>
            </div>

            <button class="btn-verify">Verify</button>

        </form>

        <!-- LINKS -->
        <div class="links mt-3">
            <p class="mb-1">
                Didn't receive code? <a href="/resend">Resend</a>
            </p>
            <a href="/login">← Back to Login</a>
        </div>

    </div>

</div>

{% endblock %}

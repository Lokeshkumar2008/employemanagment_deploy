{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block extra_css %}

<!-- ICON CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* REMOVE GAP */
main {
    padding: 0 !important;
}

/* CENTER */
.reset-wrapper {
    min-height: calc(100vh - 76px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CARD */
.reset-card {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* ICON */
.icon-box {
    width: 60px;
    height: 60px;
    background: #ede9fe;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 26px;
    color: #4f46e5;
}

/* TEXT */
.title {
    font-size: 22px;
    font-weight: 700;
    margin-top: 10px;
}

.subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
}

/* INPUT */
.input-wrapper {
    position: relative;
    margin-bottom: 15px;
}

.input-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.input-wrapper input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
}

/* BUTTON */
.btn-save {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg,#4f46e5,#6366f1);
    color: white;
    font-weight: bold;
}

/* LINK */
.links a {
    text-decoration: none;
    color: #4f46e5;
    font-size: 13px;
}

/* MOBILE */
@media(max-width:768px){
    .reset-card {
        padding: 20px;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="reset-wrapper">

    <div class="reset-card">

        <!-- ICON -->
        <div class="icon-box">
            <i class="bi bi-key"></i>
        </div>

        <!-- TITLE -->
        <div class="title">Reset Password</div>
        <div class="subtitle">
            Enter your new password below
        </div>

        <!-- FORM -->
        <form method="POST">

            <div class="input-wrapper">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" placeholder="New Password" required>
            </div>

            <button class="btn-save">Save Password</button>

        </form>

        <!-- LINK -->
        <div class="links mt-3">
            <a href="/login">← Back to Login</a>
        </div>

    </div>

</div>

{% endblock %}

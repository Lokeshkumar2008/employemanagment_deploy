<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.navbar img {
    width: 45px;
    border-radius: 50%;
}

body {
    margin: 0;
    height: 100vh;
    background-image: url("https://w0.peakpx.com/wallpaper/795/959/HD-wallpaper-best-web-development-company-in-lucknow-web-developer-web-design-web-application-web-development.jpg");
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.navbar h5 {
    color: white;
}

/* FLASH */
.flash-box {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    z-index: 9999;
}

/* CENTER */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

/* CARD */
.form-card {
    width: 380px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    color: white;
}

/* INPUT */
.form-control {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    border-radius: 10px;
}

/* BUTTON */
.btn-custom {
    background: linear-gradient(45deg, #ff7eb3, #ff758c);
    border: none;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #e5e7eb;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg px-3">
    <div class="container-fluid">


    <img src="https://static.vecteezy.com/system/resources/previews/020/859/601/non_2x/employee-management-icon-design-free-vector.jpg">

    <h5>Employee Management System</h5>

    <div class="ms-auto">
        <a class="me-3 text-decoration-none text-white" href="/view">Dashboard</a>
        <a class="text-decoration-none text-white" href="/logout">Logout</a>
    </div>

</div>


</nav>

<!-- 🔥 FLASH -->

<div class="flash-box">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <div class="alert alert-{{category}} alert-dismissible fade show">
      {{ msg }}
      <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endwith %}
</div>

<!-- FORM -->

<div class="wrapper">

<div class="form-card">


<h3>Add Employee</h3>

<form method="post">

    <input type="text" class="form-control mb-3" name="ename" placeholder="Employee Name" required>

    <input type="text" class="form-control mb-3" name="edept" placeholder="Department" required>

    <input type="number" class="form-control mb-3" name="esalary" placeholder="Salary" required>

    <input type="text" class="form-control mb-3" name="ephone" placeholder="Phone Number" required>

    <button class="btn btn-custom w-100">Add Employee</button>

</form>

</div>

</div>

<!-- FOOTER -->

<footer>
    © 2026 Employee Management System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
